<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات النطاق الجغرافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 400px;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="m-0">📍 تحديد موقع المقر</h4>
                <a href="/dashboard" class="btn btn-sm btn-light">رجوع للرئيسية</a>
            </div>
            <div class="card-body">
                <div id="map"></div>

                <form action="/set_zone" method="POST">
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label>خط العرض (Latitude)</label>
                            <input type="text" name="lat" id="lat" class="form-control" readonly required>
                        </div>
                        <div class="col-md-5 mb-3">
                            <label>خط الطول (Longitude)</label>
                            <input type="text" name="lng" id="lng" class="form-control" readonly required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label>النطاق (متر)</label>
                            <input type="number" name="radius" class="form-control" value="{{ zone.radius if zone else 100 }}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fs-5">حفظ الموقع المختار</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // 1. استلام القيم بذكاء (لو فيه None في الداتابيز هيحط قيم افتراضية)
    var savedLat = {{ zone['lat'] if zone and zone['lat'] else 30.0444 }};
    var savedLng = {{ zone['lng'] if zone and zone['lng'] else 31.2357 }};
    var savedRadius = {{ zone['radius'] if zone and zone['radius'] else 100 }};

    // 2. التأكد إن العنصر موجود قبل التشغيل
    var mapContainer = document.getElementById('map');
    if (mapContainer) {
        // تشغيل الخريطة
        var map = L.map('map').setView([savedLat, savedLng], 15);

        // تحميل مربعات الخريطة من سيرفر OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // إضافة الدبوس والدائرة
        var marker = L.marker([savedLat, savedLng]).addTo(map);
        var circle = L.circle([savedLat, savedLng], {
            radius: savedRadius,
            color: 'blue',
            fillOpacity: 0.2
        }).addTo(map);

        // ملء الخانات تلقائياً عند الفتح
        document.getElementById('lat').value = savedLat;
        document.getElementById('lng').value = savedLng;

        // 3. عند الضغط على الخريطة
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            document.getElementById('lat').value = lat.toFixed(7);
            document.getElementById('lng').value = lng.toFixed(7);

            marker.setLatLng(e.latlng);
            circle.setLatLng(e.latlng);
        });

        // حل مشكلة الخريطة اللي بتظهر رمادية أو بيضاء أحياناً
        setTimeout(function(){ map.invalidateSize(); }, 400);
    }
   
        // تأكد إن مفيش أي قوس زيادة هنا تحت السطر ده
    </script>
</body>
</html>
