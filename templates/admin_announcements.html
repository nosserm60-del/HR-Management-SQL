
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الإعلانات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow p-4 mb-4">
            <h4 class="text-primary mb-3">📢 نشر إعلان جديد</h4>
            <form method="POST">
                <input type="text" name="title" class="form-control mb-3" placeholder="عنوان الإعلان (مثال: هام جداً)" required>
                <textarea name="message" class="form-control mb-3" rows="3" placeholder="نص الإعلان..." required></textarea>
                <button type="submit" class="btn btn-primary w-100">نشر الآن 🚀</button>
            </form>
        </div>

        <h4 class="mb-3">📰 الإعلانات السابقة</h4>
        <div class="list-group">
            {% for n in news %}
            <div class="list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2" style="border-radius: 10px;">
                <div>
                    <h5 class="mb-1 fw-bold">{{ n['title'] }}</h5>
                    <small class="text-muted">{{ n['message'] }}</small>
                </div>
                <a href="/admin/delete_news/{{ n['id'] }}" class="btn btn-danger btn-sm">حذف 🗑️</a>
            </div>
            {% else %}
            <div class="alert alert-secondary text-center">لا توجد إعلانات سابقة.</div>
            {% endfor %}
        </div>
        <a href="/dashboard" class="btn btn-secondary mt-4 w-100">رجوع للرئيسية</a>
    </div>
</body>
</html>
