<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>إضافة موظف</title>
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded" style="max-width: 500px;">
        <h3 class="text-center mb-4">إضافة موظف جديد</h3>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="name" class="form-control mb-3" placeholder="الاسم بالكامل" required>
            <input type="text" name="username" class="form-control mb-3" placeholder="اسم المستخدم" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="كلمة المرور" required>

            <label class="form-label mt-2">صورة الموظف للبصمة:</label>
            <input type="file" name="photo" class="form-control mb-3" accept="image/*" required>

            <label class="form-label">القسم:</label>
            <select name="dept" class="form-select mb-3" required>
                <option value="" disabled selected>اختر القسم...</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="المبيعات">المبيعات</option>
            </select>

            <label class="form-label">الصلاحية:</label>
            <select name="role" class="form-select mb-3" required>
                <option value="" disabled selected>اختر الصلاحية...</option>
                <option value="Employee">Employee</option>
                <option value="Admin">Admin</option>
            </select>

            <label class="form-label">سعر ساعة العمل:</label>
            <input type="number" step="0.5" name="hourly_rate" class="form-control mb-3" placeholder="مثال: 50" required>

            <button class="btn btn-success w-100">حفظ الموظف</button>
        </form>
    </div>
</body>
</html>
