<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الموظفين - HR Smart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }

        .card {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-secondary"><i class="fa-solid fa-users text-primary"></i> قائمة الموظفين</h2>
            <a href="/dashboard" class="btn btn-outline-secondary">العودة للرئيسية</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="mb-4">
                    <a href="/add_employee" class="btn btn-success">
                        <i class="fa fa-plus"></i> إضافة موظف جديد
                    </a>
                </div>

                <table class="table table-hover text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>الاسم</th>
                            <th>القسم</th>
                            <th>الصلاحية</th>
                            <th>العمليات</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for emp in employees %}
                        <tr>
                            <td>#{{ emp.id }}</td>
                            <td class="fw-bold">{{ emp.name }}</td>
                            <td><span class="badge bg-info text-dark">{{ emp.department }}</span></td>
                            <td>{{ emp.role }}</td>
                            <td>
                                <a href="/delete/{{ emp.id }}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('هل أنت متأكد من حذف الموظف: {{ emp.name }}؟')">
                                    <i class="fa fa-trash"></i> حذف
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                {% if not employees %}
                <div class="alert alert-warning text-center mt-3">لا يوجد موظفين حالياً.</div>
                {% endif %}
            </div>
        </div>
    </div>

</body>
</html>
