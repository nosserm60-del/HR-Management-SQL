
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أخبار وتفاعلات الشركة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
        }

        .post-card {
            border-radius: 15px;
            border: none;
        }

        .comment-box {
            background-color: #e9ecef;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-primary"><i class="fa-solid fa-earth-americas"></i> أخبار الشركة</h3>
            <button onclick="window.history.back()" class="btn btn-secondary btn-sm">رجوع للرئيسية</button>
        </div>

        {% for n in news %}
        <div class="card shadow-sm mb-4 post-card">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center me-3 ms-3" style="width: 45px; height: 45px;">
                        <i class="fa-solid fa-bullhorn"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-bold">{{ n['title'] }}</h5>
                        <small class="text-muted">{{ n['created_at'][:10] }}</small>
                    </div>
                </div>
                <p class="fs-5">{{ n['message'] }}</p>
                <hr>

                <div class="comments-section mb-3">
                    <h6 class="text-muted mb-3"><i class="fa-regular fa-comments"></i> التعليقات:</h6>
                    {% for c in comments %}
                    {% if c['announcement_id'] == n['id'] %}
                    <div class="comment-box">
                        <strong>{{ c['user_name'] }}</strong>
                        <p class="mb-0 small">{{ c['comment'] }}</p>
                    </div>
                    {% endif %}
                    {% endfor %}
                </div>

                <form method="POST" class="d-flex">
                    <input type="hidden" name="announcement_id" value="{{ n['id'] }}">
                    <input type="text" name="comment" class="form-control me-2 ms-2" placeholder="اكتب تعليقاً..." required style="border-radius: 20px;">
                    <button type="submit" class="btn btn-primary" style="border-radius: 20px;"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
        {% else %}
        <div class="alert alert-info text-center">لا توجد أخبار أو إعلانات حالياً.</div>
        {% endfor %}
    </div>
</body>
</html>
