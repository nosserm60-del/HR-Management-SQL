<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة الفروع - HR Smart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            position: fixed;
            right: 0;
            width: 250px;
        }

            .sidebar a {
                color: #c2c7d0;
                text-decoration: none;
                padding: 15px 20px;
                display: block;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background-color: #6f42c1;
                    color: white;
                }

        .main-content {
            margin-right: 250px;
            padding: 30px;
        }

        .map-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-center mb-4 border-bottom pb-3"><i class="fa-solid fa-users-gear"></i> HR Smart</h4>
        <a href="/dashboard"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a href="/employees"><i class="fa-solid fa-users"></i> إدارة الموظفين</a>
        <a href="/map" style="background-color: #6f42c1; color: white;"><i class="fa-solid fa-map-location-dot"></i> خريطة الفروع</a>
        <a href="/set_zone"><i class="fa-solid fa-location-dot"></i> إعدادات النطاق</a>
        <a href="/logout" class="text-danger mt-5"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 shadow-sm rounded">
            <h4 class="m-0 text-dark"><i class="fa-solid fa-earth-africa text-primary"></i> تتبع الفروع والمواقع</h4>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm">رجوع</a>
        </div>

        <div class="card map-card">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-secondary">خريطة الانتشار الجغرافي</h5>
            </div>
            <div class="card-body p-0">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3453.1534!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzQwLjAiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sen!2seg!4v1625560000000!5m2!1sen!2seg"
                        allowfullscreen=""
                        loading="lazy">
                </iframe>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <small class="text-muted">نظام HR Smart يدعم تتبع الموظفين في النطاق الجغرافي المحدد (Geofencing).</small>
            </div>
        </div>
    </div>

</body>
</html>
